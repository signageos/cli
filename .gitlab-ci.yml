include:
  - project: 'signageos/infra/gitlab-ci'
    file: '/pipelines/ts-lib-public.yaml'
    ref: master

# ============================================================================
# Windows support: prepare job provides auth tokens & version for Windows jobs
# ============================================================================

prepare:windows:
  image: $ECR_REGISTRY/signageos/infra/gitlab-ci:master
  stage: test
  before_script: []
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  tags:
    - small
  script:
    - echo "NPM_REGISTRY_HOST=$NPM_REGISTRY_HOST" >> build.env
    - echo "NPM_REGISTRY_URL=$NPM_REGISTRY_URL" >> build.env
    - echo "NPM_AUTH_TOKEN=$NPM_AUTH_TOKEN" >> build.env
    - get-version --no-build-info > VERSION
    - get-release-tag > PRERELEASE
  artifacts:
    when: on_success
    paths:
      - ./VERSION
      - ./PRERELEASE
    reports:
      dotenv:
        - build.env

# ============================================================================
# Windows test job (consolidated — only one Windows runner exists)
# Uses Windows Server Core 1809 and installs Node in before_script.
# A pre-built image is not possible because docker build (DinD) is unavailable
# on the EC2 Windows runner (process isolation kernel mismatch).
# ============================================================================

test:windows:
  image: docker:24.0.9-windowsservercore-1809
  needs:
    - prepare:windows
  before_script:
    - $VERSION = Get-Content VERSION | Out-String; $VERSION = $VERSION.Trim()
    - $nodeVersion = '20.19.0'
    - Invoke-WebRequest -Uri "https://nodejs.org/dist/v$nodeVersion/node-v$nodeVersion-win-x64.zip" -OutFile node.zip
    - Expand-Archive node.zip -DestinationPath $env:ProgramFiles
    - Rename-Item "$env:ProgramFiles\node-v$nodeVersion-win-x64" node
    - Remove-Item node.zip
    - $env:PATH = "C:\Program Files\node;$env:PATH"
    - $gitVersion = '2.45.1'
    - Invoke-WebRequest -Uri "https://github.com/git-for-windows/git/releases/download/v$gitVersion.windows.1/Git-$gitVersion-64-bit.exe" -OutFile git-installer.exe
    - Start-Process -FilePath 'git-installer.exe' -ArgumentList '/VERYSILENT', '/NORESTART', '/COMPONENTS=cmd' -Wait
    - Remove-Item git-installer.exe
    - $env:PATH = "C:\Program Files\Git\cmd;$env:PATH"
    - npm install -g yarn pnpm
    - npm ci --cache npm-cache --prefer-offline --ignore-scripts
    - npm i @signageos/lib-ci --ignore-scripts --cache npm-cache --prefer-offline
    - npm i @signageos/file --cache npm-cache --prefer-offline
    - npx --userconfig ./.npmrc @signageos/lib-ci@latest version-upgrade $VERSION
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: manual
      allow_failure: true
  stage: test
  tags:
    - windows
  script:
    - Copy-Item .env.test .env
    - npm install
    - $env:NPM_REGISTRY_URL = "https://registry.npmjs.org/"
    - $env:NPM_REGISTRY_HOST = "registry.npmjs.org"
    - npm run test:unit:windows
    - npm run test:integration:windows

# CLI-specific override: run integration tests via docker-compose
test:integration:
  extends: .test:general
  variables:
    TEST_TARGET: integration
