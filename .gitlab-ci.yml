include:
  - project: 'signageos/infra/gitlab-ci'
    file: '/pipelines/ts-lib-public.yaml'
    ref: master

# CLI has no Dockerfile — disable runtime:build
runtime:build:
  rules:
    - when: never

# Version, release tag, npm auth
prepare:
  image: $ECR_REGISTRY/signageos/infra/gitlab-ci:master
  stage: runtime
  before_script: []
  rules:
    - when: always
  tags:
    - small
  script:
    - export NPM_AWS_DOMAIN='signageos'
    - export NPM_AWS_DOMAIN_OWNER=524256255273
    - export NPM_AWS_NAME='private'
    - export NPM_AWS_HOST=signageos-${NPM_AWS_DOMAIN_OWNER}.d.codeartifact.eu-central-1.amazonaws.com/npm/${NPM_AWS_NAME}
    - export NPM_AWS_URL="https://${NPM_AWS_HOST}/"
    - export NPM_AWS_TOKEN=$(aws codeartifact get-authorization-token --domain ${NPM_AWS_DOMAIN} --domain-owner ${NPM_AWS_DOMAIN_OWNER} --query authorizationToken --output text)
    - echo "NPM_REGISTRY_HOST=$NPM_AWS_HOST" >> build.env
    - echo "NPM_REGISTRY_URL=$NPM_AWS_URL" >> build.env
    - echo "NPM_AUTH_TOKEN=$NPM_AWS_TOKEN" >> build.env
    - get-version --no-build-info > VERSION
    - get-release-tag > PRERELEASE
  artifacts:
    when: on_success
    paths:
      - ./VERSION
      - ./PRERELEASE
    reports:
      dotenv:
       - build.env

# ============================================================================
# Windows
# ============================================================================

.install_package_managers: &install_package_managers "npm -g install yarn bun pnpm --force"

.windows_before_script: &windows_before_script
  before_script:
    - $VERSION = Get-Content VERSION | Out-String
    - $VERSION = $VERSION.Trim()
    - Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.19.0/node-v20.19.0-x64.msi" -OutFile "node-x64.msi"
    - Start-Process msiexec.exe -Wait -ArgumentList "/i","node-x64.msi","/norestart","ADDLOCAL=ALL"
    - $env:PATH = "C:\Program Files\nodejs;$env:PATH"
    - node --version
    - npm --version
    - New-Item -ItemType Directory -Force -Path "C:\Users\ContainerAdministrator\AppData\Roaming\npm"
    - npm ci --cache npm-cache --prefer-offline --ignore-scripts
    - npm i @signageos/lib-ci --ignore-scripts --cache npm-cache --prefer-offline
    - npm i @signageos/file --cache npm-cache --prefer-offline
    - npx --userconfig ./.npmrc @signageos/lib-ci@latest version-upgrade $VERSION
    - $env:PATH = "$(npm config get prefix)\;$env:PATH"
    - npm -g install yarn --force
    - yarn --version
    - npm -g install bun
    - bun --version
    - npm -g install pnpm
    - pnpm --version
    - Invoke-WebRequest -Uri "https://github.com/git-for-windows/git/releases/download/v2.45.1.windows.1/Git-2.45.1-64-bit.exe" -OutFile "git-installer.exe"
    - Start-Process -FilePath "git-installer.exe" -ArgumentList "/VERYSILENT /NORESTART" -Wait
    - $env:PATH = "C:\Program Files\Git\bin;$env:PATH"
    - git --version

test:general:windows:
  <<: *windows_before_script
  image: docker:24.0.9-windowsservercore-1809
  needs:
    - prepare
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  stage: test
  tags:
    - windows
  script:
    - Copy-Item .env.test .env
    - npm install
    - $env:NPM_REGISTRY_URL = "https://registry.npmjs.org/"
    - $env:NPM_REGISTRY_HOST = "registry.npmjs.org"
    - npm run test:unit:windows

test:integration:windows:
  <<: *windows_before_script
  image: docker:24.0.9-windowsservercore-1809
  needs:
    - prepare
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: manual
      allow_failure: false
  stage: test
  tags:
    - windows
  script:
    - Copy-Item .env.test .env
    - npm install
    - $env:NPM_REGISTRY_URL = "https://registry.npmjs.org/"
    - $env:NPM_REGISTRY_HOST = "registry.npmjs.org"
    - npm run test:integration:windows

# ============================================================================
# Test Overrides (no docker-gitlabci-run — CLI has no Dockerfile)
# ============================================================================

test:general:
  extends: .test:general
  image: $ECR_REGISTRY/signageos/docker-node:20-alpine-build
  needs:
    - prepare
  script:
    - cp .env.test .env
    - *install_package_managers
    - npm ci
    - npm run clean-build
    - npm install -g .
    - export NPM_REGISTRY_URL=https://registry.npmjs.org/
    - export NPM_REGISTRY_HOST=registry.npmjs.org
    - npm run test:coverage

test:lint:
  extends: .test:lint
  tags:
    - large
  needs:
    - prepare
  script:
    - if [ $(find {test,tests} -name '*.ts' -type f -print0 | xargs -0 grep '\.only' | wc -l) -gt 0 ]; then echo "You forgot the .only in tests" && exit 1; fi
    - npm ci
    - NODE_OPTIONS=--max-old-space-size=3072 npm run lint

test:check:
  extends: .test:check
  tags:
    - medium
  needs:
    - prepare
  script:
    - npm ci
    - npm run check

test:types:
  extends: .test:types
  tags:
    - small
  needs:
    - prepare
  script:
    - npm ci
    - npm run check-types

test:format:check:
  extends: .test:format:check
  tags:
    - medium
  needs:
    - prepare
  script:
    - npm ci
    - npm run lint:prettier

# ============================================================================
# CLI-Specific Test Jobs
# ============================================================================

test:public:
  stage: test
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  allow_failure: false
  script:
    - echo "Attempting to install package without credentials to detect private dependencies..."
    - |
      npm install --registry https://registry.npmjs.org/ --production --no-package-lock --dry-run || (
        echo "ERROR: Installation failed - this may indicate private dependencies"
        exit 1
      )
    - echo "Installation successful - no private dependencies detected"

test:changelog:
  image: $CI_REGISTRY/signageos/docker:master
  stage: test
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  allow_failure: true
  script:
    - ci-test-changelog

test:integration:
  image: $ECR_REGISTRY/signageos/docker-node:20-alpine-build
  stage: test
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: manual
      allow_failure: false
  script:
    - cp .env.test .env
    - sed -i "s|^SOS_API_IDENTIFICATION=.*|SOS_API_IDENTIFICATION=${SOS_API_IDENTIFICATION}|" .env
    - sed -i "s|^SOS_API_SECURITY_TOKEN=.*|SOS_API_SECURITY_TOKEN=${SOS_API_SECURITY_TOKEN}|" .env
    - *install_package_managers
    - npm ci
    - export NPM_REGISTRY_URL=https://registry.npmjs.org/
    - export NPM_REGISTRY_HOST=registry.npmjs.org
    - npm run test:integration

# ============================================================================
# Build Overrides (no docker-gitlabci-run)
# ============================================================================

build:build-npm-package:
  extends: .build:build-npm-package
  tags:
    - large
  needs:
    - prepare
  script:
    - cp .env.production .env
    - npm install --ignore-scripts
    - update-package-version "$(get-version)"
    - npm run clean-build --production
    - npm publish --tag "$(get-release-tag)" --"@signageos:registry=${NPM_REGISTRY_URL}" --//${NPM_REGISTRY_HOST}/:_authToken="${NPM_AUTH_TOKEN}"
  artifacts:
    when: on_success
    paths:
      - dist/
      - docs/

build:build-public-npm-package:
  extends: .build:build-public-npm-package
  tags:
    - large
  rules:
    - if: "$CI_COMMIT_TAG"
  needs:
    - prepare
  script:
    - cp .env.production .env
    - update-package-version "$(get-version)"
    - npm install --ignore-scripts
    - npm run clean-build --production
    - export NPM_REGISTRY_URL=https://registry.npmjs.org/
    - export NPM_REGISTRY_HOST=registry.npmjs.org
    - export NPM_AUTH_TOKEN=$PUBLIC_NPM_AUTH_TOKEN
    - npm publish --access=public --tag "$(get-release-tag)" --"@signageos:registry=${NPM_REGISTRY_URL}" --//${NPM_REGISTRY_HOST}/:_authToken="${NPM_AUTH_TOKEN}"

# ============================================================================
# Release — stable release requires tests to pass
# ============================================================================

release:tag-new-version:
  needs:
    - build:build-npm-package
    - job: build:build-public-npm-package
      optional: true
    - test:general
    - test:lint
    - test:check
    - test:changelog
